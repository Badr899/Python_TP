<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer une commande</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f5f5f5;
            margin:0;
            padding:0;
        }

        .container{
            width: 500px;
            margin: 50px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        h1{
            text-align:center;
            margin-bottom:25px;
            color:#333;
        }

        form{
            display:flex;
            flex-direction:column;
        }

        label{
            margin-top:15px;
            margin-bottom:5px;
            font-weight:bold;
        }

        input, textarea{
            padding:10px;
            border:1px solid #ccc;
            border-radius:5px;
            font-size:16px;
        }

        button{
            margin-top:25px;
            padding:12px;
            background:#28a745;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#218838;
        }
    </style>
</head>
<body>

    <div class="container">

        <h1>Créer une commande</h1>

        <form method="POST">

            {% csrf_token %}

            <label>Nom complet</label>
            <input type="text" name="nom" required>

            <label>Adresse</label>
            <textarea name="adresse" rows="4" required></textarea>

            <label>Téléphone</label>
            <input type="text" name="telephone" required>

            <button type="submit">
                Valider la commande
            </button>

        </form>

    </div>

</body>
</html>
